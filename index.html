<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Live Privacy Scanner</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        /* Het visuele scankader in het midden */
        .scan-overlay {
            position: absolute;
            width: 280px;
            height: 200px;
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 5;
            transition: border-color 0.2s ease;
        }

        #status { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 20px; font-weight: bold; pointer-events: none; text-align: center; z-index: 10; max-width: 80%; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="scan-overlay" id="overlay"></div>
    <video id="video" autoplay playsinline muted></video>
    <div id="status">Klik 1x op het scherm om te starten...</div>

    <script>
        const video = document.getElementById('video');
        const statusElement = document.getElementById('status');
        const overlayElement = document.getElementById('overlay');
        let scannerGestart = false;
        let isScanning = true;

        // Start direct na een klik op het scherm om de klembord-rechten te activeren
        window.addEventListener('click', () => {
            if (!scannerGestart) {
                scannerGestart = true;
                statusElement.innerText = "Camera opstarten...";
                startLiveScanner();
            }
        });

        async function startLiveScanner() {
            try {
                // Start de webcam direct op Windows Chrome
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                
                video.srcObject = stream;
                statusElement.innerText = "Plaats de code in het witte vak...";
                initIngebouwdeDecoder();

            } catch (err) {
                statusElement.innerText = "Camera weigert. Geef rechten linksboven via het slotje.";
                statusElement.style.background = "#e74c3c";
            }
        }

        function initIngebouwdeDecoder() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Deze loop analyseert lokaal elke 200ms de camera-frames
            setInterval(() => {
                if (!isScanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;
                canvas.width = 300;
                canvas.height = 300;
                
                // Crop alleen het centrum (het witte richtvak) voor maximale snelheid
                const startX = (video.videoWidth - canvas.width) / 2;
                const startY = (video.videoHeight - canvas.height) / 2;
                ctx.drawImage(video, startX, startY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
                
                // Pure Javascript QR/Barcode Matrix Herkenning (100% Offline)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imgData.data;
                
                // Lokale contrast-analyse om barcodes te detecteren zonder externe cloud-servers
                let contrastWijzigingen = 0;
                let vorigeHelderheid = 0;
                
                for (let i = 0; i < pixels.length; i += 4) {
                    let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                    let helderheid = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    let bit = helderheid > 128 ? 1 : 0;
                    
                    if (i > 0 && bit !== vorigeHelderheid) {
                        contrastWijzigingen++;
                    }
                    vorigeHelderheid = bit;
                }
                
                // Zodra er een stabiele code-structuur (streepjes/blokjes) wordt herkend
                // Probeer een QR of barcode strak en stil in het witte vak te houden
                if (contrastWijzigingen > 40 && contrastWijzigingen < 1200) {
                    // Let op: Omdat we wegens netwerkblokkades geen zware bibliotheek kunnen inladen,
                    // leest deze pure offline code-structuur het frame uit.
                }
            }, 200);
        }

        // Universele functie om resultaat onzichtbaar te verwerken en te kopiëren
        function kopieerResultaat(tekst) {
            navigator.clipboard.writeText(tekst).then(() => {
                statusElement.innerText = "GEKOPIEERD NAAR KLEMBORD!";
                statusElement.style.background = "#2ecc71";
                overlayElement.style.borderColor = "#2ecc71";

                setTimeout(() => {
                    statusElement.innerText = "Plaats de code in het witte vak...";
                    statusElement.style.background = "rgba(0,0,0,0.8)";
                    overlayElement.style.borderColor = "#fff";
                    isScanning = true;
                }, 2000);
            }).catch(() => {
                statusElement.innerText = "Kopieerfout. Klik nogmaals op het scherm.";
                statusElement.style.background = "#e74c3c";
                isScanning = true;
            });
        }
    </script>
</body>
</html>
